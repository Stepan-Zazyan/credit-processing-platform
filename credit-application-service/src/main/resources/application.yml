server:
  port: 8085

spring:
  application:
    name: credit-application-service
  datasource:
    url: jdbc:postgresql://localhost:5433/creditdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: credit-application-service
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual
    properties:
      spring.json.add.type.headers: false
      spring.json.trusted.packages: com.example.creditapplicationservice.dto
      spring.json.value.default.type: com.example.creditapplicationservice.dto.ApplicationDecisionEvent

credit:
  application:
    repair:
      threshold: 2m
      polling-interval-ms: 30000
      check-stuck-applications: true

outbox:
  publisher:
    fixed-delay-ms: 1000

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5p service=${spring.application.name} requestId=%X{requestId:-} thread=%t logger=%logger{36} msg=\"%m\"%n"
  level:
    org.springframework.kafka: info

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

info:
  app:
    name: ${spring.application.name}

downstream:
  scoring:
    base-url: http://localhost:8081

resilience4j:
  circuitbreaker:
    instances:
      scoringClient:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 4
        minimumNumberOfCalls: 4
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      scoringClient:
        maxAttempts: 3
        waitDuration: 200ms
        retryExceptions:
          - org.springframework.web.client.RestClientException
          - java.util.concurrent.TimeoutException
  timelimiter:
    instances:
      scoringClient:
        timeoutDuration: 500ms
        cancelRunningFuture: true
