server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/creditdb?currentSchema=scoring
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: scoring
  flyway:
    enabled: true
    create-schemas: true
    schemas: scoring
    default-schema: scoring
    table: flyway_schema_history
    locations: classpath:db/migration
  application:
    name: scoring-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: scoring-service
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual
    properties:
      spring.json.add.type.headers: false
      spring.json.trusted.packages: com.example.scoringservice.dto
      spring.json.value.default.type: com.example.scoringservice.dto.ApplicationCreatedEvent

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5p service=${spring.application.name} requestId=%X{requestId:-} thread=%t logger=%logger{36} msg=\"%m\"%n"
  level:
    org.springframework.kafka: info

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

info:
  app:
    name: ${spring.application.name}
